version: 2

models:
  - name: int_session
    description: "Session-level aggregated table for funnel analysis, combining session, page view, item view, and order data."

    columns:
      - name: session_id
        description: "Unique identifier for each session"
        tests:
          - not_null
          - unique

      - name: client_id
        description: "Unique identifier for each client"
        tests:
          - not_null

      - name: session_time
        description: "Timestamp when the session started"

      - name: has_page_view
        description: "Indicates whether the session includes at least one page view"

      - name: has_item_view
        description: "Indicates whether the session includes at least one item view"

      - name: has_add_to_cart
        description: "Indicates whether any item was added to cart during the session"

      - name: has_order
        description: "Indicates whether an order was placed during the session"

      - name: total_page_views
        description: "Total number of pages viewed during the session"

      - name: total_items_viewed
        description: "Total number of items viewed during the session"

      - name: total_add_to_cart_quantity
        description: "Total quantity of items added to cart during the session"

      - name: total_remove_from_cart_quantity
        description: "Total quantity of items removed from cart during the session"

      - name: order_count
        description: "Total number of orders placed during the session"


  - name: int_employee
    description: "Employee-level intermediate table built by combining hr_joins and hr_quits."

    columns:
      - name: employee_id
        description: "Unique identifier for each employee"
        tests:
          - not_null
          - unique

      - name: name
        description: "Employee name"

      - name: title
        description: "Employee job title"

      - name: city
        description: "City where the employee is located"

      - name: address
        description: "Employee address"

      - name: annual_salary
        description: "Employee annual salary"

      - name: hire_date
        description: "Date when the employee was hired"

      - name: quit_date
        description: "Date when the employee left the company, if applicable"

      - name: employee_status
        description: "Current employee status (active or quit)"

      - name: is_quit
        description: "Boolean flag indicating whether the employee has quit"

  - name: int_orders
    description: "Order-level intermediate table built from orders, item views, and returns. Each row represents one order and includes item amount, shipping, tax, refund status, and net revenue."

    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique

      - name: session_id
        description: "Session identifier associated with the order"
        tests:
          - not_null

      - name: client_name
        description: "Name of the client who placed the order"

      - name: order_time
        description: "Timestamp when the order was placed"

      - name: payment_method
        description: "Payment method used for the order"

      - name: shipping_address
        description: "Shipping address for the order"

      - name: state
        description: "State associated with the shipping address"

      - name: distinct_items_ordered
        description: "Number of distinct items added to cart in the session associated with the order"

      - name: total_add_to_cart_quantity
        description: "Total quantity of items added to cart in the session associated with the order"

      - name: total_remove_from_cart_quantity
        description: "Total quantity of items removed from cart in the session associated with the order"

      - name: gross_added_amount
        description: "Total dollar amount of items added to cart before removals"

      - name: removed_amount
        description: "Total dollar amount of items removed from cart"

      - name: net_item_amount
        description: "Net item amount after subtracting removed item value from added item value"

      - name: shipping_cost
        description: "Shipping cost charged for the order"

      - name: tax_rate
        description: "Tax rate applied to the order"

      - name: tax_amount
        description: "Tax amount calculated from net item amount and tax rate"

      - name: gross_order_amount
        description: "Total order amount before refunds, including net item amount, shipping cost, and tax"

      - name: is_refunded
        description: "Boolean flag indicating whether the order was refunded"

      - name: returned_date
        description: "Date when the order was returned, if applicable"

      - name: net_revenue
        description: "Final realized revenue for the order; zero if refunded, otherwise equal to gross order amount"