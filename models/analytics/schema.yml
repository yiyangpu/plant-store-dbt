version: 2

models:
  - name: fact_session
    description: "One row per session, summarizing its events on the website."

    columns:
      - name: session_id
        description: "Unique identifier for each website session."
        tests:
          - unique
          - not_null

      - name: client_id
        description: "Identifier of the client associated with the session."
        tests:
            - not_null
            
      - name: device_os
        description: "Operating system used in the session, such as ios, android, mac, or windows."

      - name: session_time
        description: "Timestamp when the session started."

      - name: has_page_view
        description: "Boolean flag indicating whether the session had at least one page view."

      - name: has_item_view
        description: "Boolean flag indicating whether the session viewed at least one item."

      - name: has_shop_page
        description: "Boolean flag indicating whether the session viewed the shop_plants page."

      - name: has_add_to_cart
        description: "Boolean flag indicating whether at least one item was added to cart during the session."

      - name: has_order
        description: "Boolean flag indicating whether the session resulted in at least one order."

      - name: total_page_views
        description: "Total number of page views recorded in the session."

      - name: total_items_viewed
        description: "Total number of item-view events recorded in the session."

      - name: total_add_to_cart_quantity
        description: "Total quantity of items added to cart during the session."

      - name: total_remove_from_cart_quantity
        description: "Total quantity of items removed from cart during the session."

      - name: order_count
        description: "Total number of orders associated with the session."
  

  - name: dim_item
    description: "One row per item sold on the website, summarizing item-level engagement and cart activity."

    columns:
      - name: item_name
        description: "Name of the item viewed on the website."
        tests:
          - unique
          - not_null

      - name: avg_price
        description: "Average price per unit of the item across all item-view records."

      - name: total_item_views
        description: "Total number of item-view events recorded for the item."
        tests:
          - not_null

      - name: total_add_to_cart
        description: "Total quantity of the item added to cart across all sessions."

      - name: total_remove_from_cart
        description: "Total quantity of the item removed from cart across all sessions."


  - name: dim_employee
    description: "One row per employee, containing employee attributes and current employment status."

    columns:
      - name: employee_id
        description: "Unique identifier for each employee."
        tests:
          - not_null
          - unique

      - name: name
        description: "Employee name."

      - name: title
        description: "Employee job title."

      - name: city
        description: "City where the employee is located."

      - name: address
        description: "Employee address."

      - name: annual_salary
        description: "Employee annual salary."

      - name: hire_date
        description: "Date when the employee was hired."

      - name: quit_date
        description: "Date when the employee left the company, if applicable."

      - name: employee_status
        description: "Current employment status of the employee, such as active or quit."

      - name: is_quit
        description: "Boolean flag indicating whether the employee has quit the company."
  
  
  - name: dim_client
    description: "One row per client, summarizing the client's session history and latest device information."

    columns:
      - name: client_id
        description: "Unique identifier for each client."
        tests:
          - unique
          - not_null

      - name: latest_device_os
        description: "Most recent device operating system observed for the client."

      - name: first_session_time
        description: "Timestamp of the client's first recorded session."

      - name: last_session_time
        description: "Timestamp of the client's most recent recorded session."

      - name: total_sessions
        description: "Total number of sessions associated with the client."

      - name: is_returning_client
        description: "Boolean flag indicating whether the client had more than one session."


  - name: fact_order
    description: "Fact table at the order level. Each row represents one order, including item amounts, shipping, tax, refund status, and final net revenue."

    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique

      - name: session_id
        description: "Session associated with the order"

      - name: client_name
        description: "Name of the client who placed the order"

      - name: order_time
        description: "Timestamp when the order was placed"

      - name: payment_method
        description: "Payment method used for the order"

      - name: state
        description: "State of the shipping address"

      - name: net_item_amount
        description: "Net item amount after subtracting removed items from added items"

      - name: shipping_cost
        description: "Shipping cost charged for the order"

      - name: tax_amount
        description: "Tax amount applied to the order"

      - name: gross_order_amount
        description: "Total order amount before refunds (item + shipping + tax)"

      - name: is_refunded
        description: "Boolean flag indicating whether the order was refunded"

      - name: returned_date
        description: "Date when the order was returned (if applicable)"

      - name: net_revenue
        description: "Final realized revenue: zero if refunded, otherwise equal to gross_order_amount"


  - name: daily_finances
    description: "Daily finance summary table combining order revenue, employee salary expense, and recorded operating expenses to track business income at the daily level."

    columns:
      - name: date
        description: "Calendar date for the daily financial summary"
        tests:
          - not_null
          - unique

      - name: order_revenue
        description: "Total net revenue from orders placed on that date"

      - name: employee_salary
        description: "Total daily salary expense for all employees active on that date, calculated as annual salary divided by 365"

      - name: hr_cost
        description: "Recorded HR-related operating expenses for that date, excluding employee salary"

      - name: warehouse_cost
        description: "Recorded warehouse-related operating expenses for that date"

      - name: tech_tool_cost
        description: "Recorded technology tool expenses for that date"

      - name: other_cost
        description: "Recorded other operating expenses for that date"

      - name: total_operating_expenses
        description: "Total recorded non-salary operating expenses for that date, summed across all expense categories"

      - name: total_cost
        description: "Total daily business cost, calculated as employee salary plus total recorded operating expenses"

      - name: net_income
        description: "Daily net income, calculated as order revenue minus total cost"