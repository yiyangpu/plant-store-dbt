name: 'plant_store_dbt'
version: '1.0'
config-version: 2

profile: 'default'

# 指定项目结构
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# default model
models:
  plant_store_dbt:
    
    # staging / base layer
    staging:
      +materialized: view
      +schema: staging

    # intermediate layer
    intermediate:
      +materialized: view
      +schema: intermediate

    # mart / analytics layer
    marts:
      +materialized: table
      +schema: analytics